# ref: <https://git-cliff.org/docs/configuration/>

[bump]
features_always_bump_minor = false
breaking_always_bump_major = false
initial_tag = "v0.1.0"

[changelog]
# ref: <https://git-cliff.org/docs/templating/examples/>
# ref: <https://github.com/orhun/git-cliff/blob/main/cliff.toml>
# ref: <https://release-plz.dev/docs/changelog/examples>
header = """\
<!-- This file is @generated by `.github/workflows/release-pr.yaml`. -->

# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Conventional Changelog](https://github.com/conventional-changelog/conventional-changelog-config-spec/blob/master/versions/2.2.0/README.md),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""
body = """
{%- macro remote_url() -%}
  https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}
{%- endmacro -%}

{%- macro pull(p) -%}
  [#{{ p }}]({{ self::remote_url() }}/pull/{{ p }})
{%- endmacro -%}

{%- macro user(u) -%}
  {%- if u is ending_with("[bot]") -%}
    {%- set botname = u | trim_end_matches(pat="[bot]") -%}
    [@{{ u }}](https://github.com/apps/{{ botname }})
  {%- else -%}
    [@{{ u }}](https://github.com/{{ u }})
  {%- endif -%}
{%- endmacro user -%}

{%- macro print_commit(c) -%}
  - {% if c.scope %}**({{ c.scope }})** {% endif -%}\
    {%- if c.breaking %}**\\[breaking\\]** {% endif -%}\
      {{ c.message }} - \
        [{{ c.id | truncate(length=7, end="") }}]({{ self::remote_url() }}/commit/{{ c.id }})
        {%- if c.remote.username %} by {{ self::user(u=c.remote.username) }}{% endif -%}
        {%- if c.remote.pr_number %} in {{ self::pull(p=c.remote.pr_number) }}{% endif -%}
{%- endmacro -%}

{%- macro print_breaking(c) -%}
  - {% if c.scope %}**({{ c.scope }})** {% endif -%}\
      {%- if c.breaking_description -%}
        {{ c.breaking_description }}
      {%- else -%}
        {{ c.message }}
      {%- endif %} - \
      [{{ c.id | truncate(length=7, end="") }}]({{ self::remote_url() }}/commit/{{ c.id }})\
      {%- if c.remote.username %} by {{ self::user(u=c.remote.username) }}{% endif -%}\
      {%- if c.remote.pr_number %} in {{ self::pull(p=c.remote.pr_number) }}{% endif -%}
{%- endmacro -%}

{%- if version -%}
  ## [{{ version }}]({{ self::remote_url() }}/releases/tag/{{ version }}) - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## \\[Unreleased\\]
{% endif -%}

{%- if commits | filter(attribute="breaking", value=true) | length > 0 -%}
  ### 💥 BREAKING CHANGES
  {% for commit in commits | filter(attribute="breaking", value=true) -%}
    {{ self::print_breaking(c=commit) }}
  {% endfor -%}
{%- endif -%}

{%- for group, commits in commits | group_by(attribute="group") -%}
  ### {{ group | striptags | trim | upper_first }}
  {% for commit in commits | filter(attribute="scope") | sort(attribute="scope") -%}
    {{ self::print_commit(c=commit) }}
  {% endfor -%}
  {%- for commit in commits -%}
    {%- if not commit.scope -%}
      {{ self::print_commit(c=commit) }}
    {% endif -%}
  {%- endfor -%}
{%- endfor -%}

{%- if github -%}
  {%- if github.contributors | length > 0 -%}
    ### ❤️ Contributors
    {% for contributor in github.contributors -%}
      {%- if contributor.is_first_time -%}
      - {{ self::user(u=contributor.username) }} made their first contribution
        {%- if contributor.pr_number %} in {{ self::pull(p=contributor.pr_number) }}{% endif %}
      {% else -%}
      - {{ self::user(u=contributor.username) }}
      {% endif -%}
    {%- endfor -%}
  {%- endif -%}
{%- endif -%}
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
require_conventional = false
split_commits = false
commit_parsers = [
  # ref: <https://commitlint.js.org/reference/prompt.html>
  # ref: <https://github.com/arvinxx/gitmoji-commit-workflow>
  # ref: <https://github.com/lobehub/lobe-cli-toolbox/blob/master/packages/lobe-commit/src/constants/gitmojis.ts>
  # ref: <https://gitmoji.dev/>
  { message = "^feat", group = "<!-- 0 -->✨ Features" },
  { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
  { message = "^docs", group = "<!-- 2 -->📝 Documentation" },
  { message = "^style", group = "<!-- 3 -->🎨 Styles" },
  { message = "^refactor", group = "<!-- 4 -->♻️ Code Refactoring" },
  { message = "^perf", group = "<!-- 5 -->⚡️ Performance Improvements" },
  { message = "^test", group = "<!-- 6 -->✅ Tests" },
  { message = "^build", group = "<!-- 7 -->🛠 Builds" },
  { message = "^ci", group = "<!-- 8 -->⚙️ Continuous Integrations" },
  { message = "^chore", group = "🎫 Chores", skip = true },
  { message = "^revert", group = "<!-- 9 -->⏪️ Reverts" },
]
protect_breaking_commits = true
filter_commits = true
fail_on_unmatched_commit = false
tag_pattern = "v[0-9].*"
